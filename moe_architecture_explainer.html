
<style>
.input-btn{padding:8px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);cursor:pointer;font-size:13px;color:var(--color-text-primary);transition:all .15s;white-space:nowrap}
.input-btn.active{border:2px solid #534AB7;background:#EEEDFE;color:#3C3489;font-weight:500}
.expert-box{border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);padding:10px 12px;text-align:center;transition:all .3s;background:var(--color-background-secondary)}
.expert-box.active{border:2px solid #1D9E75;background:#E1F5EE}
.expert-box.dormant{opacity:0.35}
.expert-name{font-size:12px;font-weight:500;color:var(--color-text-primary);margin:0 0 3px}
.expert-sub{font-size:11px;color:var(--color-text-secondary)}
.expert-box.active .expert-name{color:#085041}
.expert-box.active .expert-sub{color:#0F6E56}
.router-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:12px 16px;text-align:center;margin:12px 0}
.router-label{font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin:0 0 4px}
.router-decision{font-size:13px;font-weight:500;color:var(--color-text-primary);margin:0;min-height:20px;transition:all .2s}
.score-row{display:flex;align-items:center;gap:8px;margin:4px 0}
.score-label{font-size:11px;color:var(--color-text-secondary);min-width:100px;text-align:right}
.score-track{flex:1;height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden;border:0.5px solid var(--color-border-tertiary)}
.score-fill{height:100%;border-radius:3px;transition:width .4s ease}
.score-pct{font-size:11px;color:var(--color-text-secondary);min-width:28px}
.stat-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:12px}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;text-align:center}
.stat-n{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.stat-l{font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.04em;margin-top:2px}
.dense-note{margin-top:12px;padding:10px 14px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);font-size:12px;color:var(--color-text-secondary);line-height:1.5}
</style>

<div style="padding:1rem 0">

<div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:10px">Select an input type — the router picks which 2 experts activate:</div>

<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px">
  <button class="input-btn active" onclick="select('legal')">Legal text</button>
  <button class="input-btn" onclick="select('code')">Python code</button>
  <button class="input-btn" onclick="select('multilingual')">French query</button>
  <button class="input-btn" onclick="select('finance')">Financial doc</button>
  <button class="input-btn" onclick="select('general')">General text</button>
</div>

<div class="router-box">
  <div class="router-label">Router (gating network)</div>
  <div class="router-decision" id="router-text">Routing: legal text → activating experts 3 + 5</div>
  <div style="margin-top:10px" id="scores"></div>
</div>

<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px">Expert pool (8 total — only 2 active per token):</div>
<div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px" id="experts"></div>

<div class="stat-row">
  <div class="stat"><div class="stat-n" id="s-total">8</div><div class="stat-l">Total experts</div></div>
  <div class="stat"><div class="stat-n" style="color:#1D9E75">2</div><div class="stat-l">Active per token</div></div>
  <div class="stat"><div class="stat-n" style="color:#534AB7" id="s-pct">25%</div><div class="stat-l">Compute used</div></div>
</div>

<div class="dense-note" id="dense-note"></div>

<button onclick="sendPrompt('How does MoE in Voyage 4 help with multilingual embedding quality?')" style="width:100%;margin-top:12px;font-size:13px;padding:10px">
  How does MoE help Voyage 4 specifically? ↗
</button>
</div>

<script>
var expertDefs = [
  {id:0, name:'Syntax & structure', sub:'grammar, parsing'},
  {id:1, name:'Semantic similarity', sub:'meaning, context'},
  {id:2, name:'Multilingual', sub:'cross-lingual transfer'},
  {id:3, name:'Legal & contracts', sub:'clauses, precedent'},
  {id:4, name:'Code & logic', sub:'functions, APIs'},
  {id:5, name:'Domain concepts', sub:'specialised terms'},
  {id:6, name:'Long context', sub:'document-level'},
  {id:7, name:'Finance & numbers', sub:'metrics, ratios'},
];

var configs = {
  legal:        {active:[3,5], text:'Legal text → experts 3 + 5', scores:[8,22,5,95,3,88,12,4],  note:'Dense model would run all 8 experts. MoE activates only the legal specialist and domain concepts expert — same output quality, 75% less compute.'},
  code:         {active:[4,0], text:'Python code → experts 4 + 0', scores:[82,15,3,4,97,10,8,2],  note:'Code gets the logic expert + syntax expert. Multilingual and finance experts sit dormant — they add no value here and are skipped entirely.'},
  multilingual: {active:[2,1], text:'French query → experts 2 + 1', scores:[10,88,94,6,3,14,20,5], note:'A French sentence activates the multilingual transfer expert and semantic similarity expert. The legal and finance specialists are irrelevant and unused.'},
  finance:      {active:[7,5], text:'Financial doc → experts 7 + 5', scores:[5,18,7,12,4,82,10,96], note:'Financial text routes to the numbers/ratios expert and domain concepts expert. Code and multilingual experts contribute nothing and stay dormant.'},
  general:      {active:[1,0], text:'General text → experts 1 + 0', scores:[75,92,30,15,20,25,18,10], note:'General text activates the broad semantic similarity and syntax experts — the two most universally applicable. Specialised experts stay off.'},
};

var current = 'legal';

function select(type) {
  current = type;
  document.querySelectorAll('.input-btn').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('onclick').includes("'"+type+"'"));
  });
  render();
}

function render() {
  var c = configs[current];
  document.getElementById('router-text').textContent = 'Routing: ' + c.text;

  var scoresHTML = '';
  expertDefs.forEach(function(e, i) {
    var pct = Math.round(c.scores[i]);
    var isTop = c.active.indexOf(i) !== -1;
    var color = isTop ? '#1D9E75' : '#B4B2A9';
    scoresHTML += '<div class="score-row">'
      + '<span class="score-label">' + e.name + '</span>'
      + '<div class="score-track"><div class="score-fill" style="width:'+pct+'%;background:'+color+'"></div></div>'
      + '<span class="score-pct">'+pct+'%</span>'
      + '</div>';
  });
  document.getElementById('scores').innerHTML = scoresHTML;

  var expHTML = '';
  expertDefs.forEach(function(e) {
    var isActive = c.active.indexOf(e.id) !== -1;
    expHTML += '<div class="expert-box '+(isActive?'active':'dormant')+'">'
      + '<div class="expert-name">'+(isActive?'&#9679; ':'')+e.name+'</div>'
      + '<div class="expert-sub">'+e.sub+'</div>'
      + '</div>';
  });
  document.getElementById('experts').innerHTML = expHTML;
  document.getElementById('dense-note').textContent = c.note;
}

render();
</script>
